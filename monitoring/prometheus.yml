global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'crypto-llm-analyst'
    static_configs:
      - targets: ['crypto-llm-analyst:8000']
    scrape_interval: 30s
    metrics_path: '/metrics'
    
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 60s
    
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 60s